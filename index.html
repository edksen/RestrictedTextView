<!DOCTYPE html>
<html>
    <head>
        <title>Restricted Text View</title>
        <link rel="stylesheet" href="./styles/main_style.css">
    </head>
    <body>
        <h1 class="mainPageText center">Write your Message</h1>
        <div id="container" class="textInputArea center">
            <textarea id="main_input_field" class="textInputField mainPageText" maxlength="250" placeholder="Start typing..." oninput="onInputChange()"></textarea>
            <label for="main_input_field" id="character_counter" class="characterCounter mainPageText"></label>
        </div>
    </body>

    <script>
        function onInputChange() {
            let label = document.getElementById("character_counter");
            let textArea = document.getElementById("main_input_field");

            let textLength = textArea.value.length;
            let symbolsMaxSize = textArea.maxLength; 

            label.textContent = `${textLength}/${symbolsMaxSize}`;
            document.getElementById("container").classList.toggle("invalidInput", textLength >= symbolsMaxSize);
        }

        onInputChange();
    </script>
</html>
